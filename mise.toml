[env]
MISE_USE_VERSIONS_HOST = "0"
_.path = ["~/.luarocks/bin"]

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
pkl = "latest"
stylua = "latest"
"aqua:kubernetes-sigs/krew" = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.unit-test]
description = "Run Lua unit tests"
run = "lua tests/run_tests.lua"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "unit-test", "test"]
